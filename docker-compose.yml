services:
  api:
    build: .
    container_name: agendaops-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests

  worker:
    build: .
    container_name: agendaops-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: celery -A agendaops.worker.celery_app worker --loglevel=info
    volumes:
      - ./src:/app/src    

  redis:
    image: redis:7-alpine
    container_name: agendaops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10    

  db:
    image: postgres:16-alpine
    container_name: agendaops-db
    environment:
      POSTGRES_DB: agendaops
      POSTGRES_USER: agendaops
      POSTGRES_PASSWORD: agendaops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendaops -d agendaops"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: agendaops-nginx
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
